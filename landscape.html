<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isogeny — Landscape</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ── Graph container ── */
        #graph-outer {
            position: relative;
            width: 100%;
            border: 1px solid var(--border);
            border-radius: var(--r);
            background: var(--surface);
            box-shadow: var(--shadow);
            overflow: hidden;
            touch-action: none;
        }

        #graph-svg {
            display: block;
            width: 100%;
            height: auto;
            cursor: grab;
            user-select: none;
        }
        #graph-svg.dragging { cursor: grabbing; }

        /* ── Toolbar above graph ── */
        .graph-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        /* ── Zoom controls (inside graph) ── */
        .zoom-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 10;
        }
        .zoom-btn {
            width: 28px; height: 28px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            color: var(--text);
            font-size: 15px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background .15s;
            font-family: var(--mono);
        }
        .zoom-btn:hover { background: var(--surface2); }

        /* ── Tooltip ── */
        #tooltip {
            position: absolute;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 8px 12px;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity .12s;
            max-width: 200px;
            box-shadow: var(--shadow-lg);
            z-index: 20;
        }
        #tooltip.show { opacity: 1; }
        .tt-name  { font-family: var(--mono); font-weight: 600; color: var(--accent); margin-bottom: 2px; }
        .tt-id    { font-size: 10px; color: var(--muted); }
        .tt-hint  { font-size: 10px; color: var(--muted); margin-top: 4px; font-style: italic; }

        /* ── Legend ── */
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 14px 24px;
            margin-top: 14px;
            font-size: 12px;
            color: var(--muted);
            padding: 12px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
        }
        .legend-item { display: flex; align-items: center; gap: 7px; }
        .l-swatch    { width: 32px; height: 16px; border-radius: 3px; border: 1.5px solid; flex-shrink: 0; }

        /* ── Uncertain warning ── */
        .uncertain-note {
            margin-top: 10px;
            font-size: 11px;
            color: var(--muted);
            font-style: italic;
        }
    </style>
</head>
<body>
<div id="page">

    <header>
        <div class="header-inner">
            <span class="logo">⬡ Isogeny</span>
            <button class="icon-btn" id="theme-btn" title="Toggle theme">
                <svg id="i-sun" viewBox="0 0 24 24" style="display:none"><path d="M12 7a5 5 0 1 0 0 10A5 5 0 0 0 12 7zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a1 1 0 0 0-1.41 1.41l1.06 1.06a1 1 0 1 0 1.41-1.41L5.99 4.58zm12.37 12.37a1 1 0 0 0-1.41 1.41l1.06 1.06a1 1 0 1 0 1.41-1.41l-1.06-1.06zm1.06-12.37-1.06 1.06a1 1 0 1 0 1.41 1.41l1.06-1.06a1 1 0 0 0-1.41-1.41zM7.05 18.36l-1.06 1.06a1 1 0 1 0 1.41 1.41l1.06-1.06a1 1 0 0 0-1.41-1.41z"/></svg>
                <svg id="i-moon" viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8A9.028 9.028 0 0 0 12 3z"/></svg>
            </button>
        </div>
    </header>

    <nav class="scheme-tabbar">
        <div class="scheme-tabbar-inner">
            <a href="index.html#nike" class="scheme-tab">Key Exchange</a>
            <a href="index.html#sig"  class="scheme-tab">Signatures</a>
            <button class="scheme-tab active">Zoo</button>
        </div>
    </nav>

    <main>
        <h1 class="page-title">Isogeny Zoo - Group Action</h1>
        <p class="page-sub">Relationships between isogeny-based group action constructions. Click a paper to open its ePrint page. Drag to pan, scroll or pinch to zoom.</p>

        <div class="graph-toolbar">
            <button class="btn-sm" id="btn-reset">Reset view</button>
            <button class="btn-sm" id="btn-png">Download PNG</button>
            <a href="editor.html" class="btn-sm" style="text-decoration:none">✏ Edit</a>
        </div>

        <div id="graph-outer">
            <svg id="graph-svg" xmlns="http://www.w3.org/2000/svg"></svg>
            <div class="zoom-controls">
                <button class="zoom-btn" id="btn-zin">+</button>
                <button class="zoom-btn" id="btn-zout">−</button>
            </div>
            <div id="tooltip"></div>
        </div>

        <div class="legend" id="legend"></div>
    </main>
</div>

<script>
'use strict';
(async () => {

/* ═══════════════════════════
   THEME
═══════════════════════════ */
const saved = localStorage.getItem('theme')
let isDark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches
applyTheme()

document.getElementById('theme-btn').addEventListener('click', () => {
    isDark = !isDark
    localStorage.setItem('theme', isDark ? 'dark' : 'light')
    applyTheme()
    render()
})
function applyTheme() {
    document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light')
    document.getElementById('i-sun').style.display  = isDark ? 'block' : 'none'
    document.getElementById('i-moon').style.display = isDark ? 'none'  : 'block'
}

/* ═══════════════════════════
   LOAD DATA
═══════════════════════════ */
let data
try {
    data = await fetch('landscape_data.json').then(r => r.json())
} catch (e) {
    document.getElementById('graph-outer').textContent = 'Failed to load landscape_data.json'
    return
}

const { nodes, tag_regions } = data

// Build edge list from depends_on
const edges = []
for (const node of nodes) {
    for (const dep of (node.depends_on || [])) {
        edges.push({ from: dep, to: node.id })
    }
}

/* ═══════════════════════════
   DAG LAYOUT ALGORITHM
   Sugiyama-style: longest-path
   layer assignment + barycenter
   ordering + centered placement.
═══════════════════════════ */
function computeLayout(containerW) {
    const NODE_W = 118
    const NODE_H = 38
    const PAD_X  = 50
    const PAD_Y  = 50
    const SPACING_X = 148  // horizontal gap between columns
    const SPACING_Y = 90   // vertical gap between rows

    // --- Step 1: Build adjacency ---
    const outEdges = {}, inEdges = {}
    nodes.forEach(n => { outEdges[n.id] = []; inEdges[n.id] = [] })
    edges.forEach(e => {
        if (outEdges[e.from]) outEdges[e.from].push(e.to)
        if (inEdges[e.to])   inEdges[e.to].push(e.from)
    })

    // --- Step 2: Topological sort (Kahn) ---
    const inDeg = {}
    nodes.forEach(n => inDeg[n.id] = inEdges[n.id].length)
    const queue = nodes.filter(n => inDeg[n.id] === 0).map(n => n.id)
    const topo = []
    while (queue.length) {
        const id = queue.shift()
        topo.push(id)
        for (const s of outEdges[id]) {
            if (--inDeg[s] === 0) queue.push(s)
        }
    }

    // --- Step 3: Longest-path layer assignment ---
    const layer = {}
    nodes.forEach(n => layer[n.id] = 0)
    for (const id of topo) {
        for (const s of outEdges[id]) {
            layer[s] = Math.max(layer[s] || 0, (layer[id] || 0) + 1)
        }
    }

    const numLayers = Math.max(...Object.values(layer)) + 1
    const layers = Array.from({ length: numLayers }, () => [])
    for (const n of nodes) layers[layer[n.id]].push(n.id)

    // --- Step 4: Barycenter ordering (3 passes, fwd + bwd) ---
    const pos = {}  // position within layer
    layers.forEach((l, i) => l.forEach((id, j) => pos[id] = j))

    const avg = arr => arr.length ? arr.reduce((a, b) => a + b, 0) / arr.length : 0

    for (let pass = 0; pass < 4; pass++) {
        // Forward: sort by avg predecessor position
        for (let i = 1; i < layers.length; i++) {
            layers[i].sort((a, b) =>
                avg(inEdges[a].map(p => pos[p] ?? 0)) -
                avg(inEdges[b].map(p => pos[p] ?? 0))
            )
            layers[i].forEach((id, j) => pos[id] = j)
        }
        // Backward: sort by avg successor position
        for (let i = layers.length - 2; i >= 0; i--) {
            layers[i].sort((a, b) =>
                avg(outEdges[a].map(s => pos[s] ?? 0)) -
                avg(outEdges[b].map(s => pos[s] ?? 0))
            )
            layers[i].forEach((id, j) => pos[id] = j)
        }
    }

    // --- Step 5: Assign (x, y) coordinates ---
    // Each layer is a row. Layers are vertical (TB layout).
    // Center each row within the canvas width.
    const maxNodesInLayer = Math.max(...layers.map(l => l.length))
    const totalW = PAD_X * 2 + (maxNodesInLayer - 1) * SPACING_X + NODE_W
    const totalH = PAD_Y * 2 + (numLayers - 1) * SPACING_Y + NODE_H

    const positions = {}
    for (let l = 0; l < layers.length; l++) {
        const row = layers[l]
        const rowWidth = (row.length - 1) * SPACING_X
        const startX = totalW / 2 - rowWidth / 2
        row.forEach((id, i) => {
            positions[id] = {
                x: startX + i * SPACING_X,
                y: PAD_Y + l * SPACING_Y + NODE_H / 2
            }
        })
    }

    return { positions, totalW, totalH, NODE_W, NODE_H }
}

/* ═══════════════════════════
   REGION BOXES
   Compute bounding box of all
   nodes in each tag group,
   add padding. Draw in
   draw_order (low = back).
═══════════════════════════ */
function computeRegions(positions, nodeW, nodeH, tagRegions) {
    const PADDING = [0, 22, 40, 58, 76]  // padding by draw_order level

    const boxes = []
    for (const [tagId, tagDef] of Object.entries(tagRegions)) {
        const tagged = nodes.filter(n => (n.tags || []).includes(tagId))
        if (!tagged.length) continue

        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity
        for (const n of tagged) {
            const p = positions[n.id]
            if (!p) continue
            minX = Math.min(minX, p.x - nodeW / 2)
            minY = Math.min(minY, p.y - nodeH / 2)
            maxX = Math.max(maxX, p.x + nodeW / 2)
            maxY = Math.max(maxY, p.y + nodeH / 2)
        }
        if (!isFinite(minX)) continue

        const order = tagDef.draw_order || 1
        const pad   = PADDING[Math.min(order, PADDING.length - 1)]

        boxes.push({
            id: tagId, label: tagDef.label, order,
            color: tagDef.color || '#2a8a8a',
            x: minX - pad, y: minY - pad,
            w: (maxX - minX) + pad * 2,
            h: (maxY - minY) + pad * 2
        })
    }

    // Draw outermost boxes first (largest draw_order drawn last = on top is wrong —
    // we want largest bounding boxes drawn first so smaller ones appear on top)
    boxes.sort((a, b) => b.order - a.order)
    return boxes
}

/* ═══════════════════════════
   SVG HELPERS
═══════════════════════════ */
const NS = 'http://www.w3.org/2000/svg'
function el(tag, attrs = {}, text = null) {
    const e = document.createElementNS(NS, tag)
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v)
    if (text !== null) e.textContent = text
    return e
}

// Find where a ray from (ox,oy) toward rectangle centered at (rx,ry) exits that rectangle
function rectIntersect(ox, oy, rx, ry, hw, hh) {
    const dx = rx - ox, dy = ry - oy
    if (Math.hypot(dx, dy) < 1) return [rx, ry]
    const MARGIN = 4
    const candidates = []
    const tryT = (t, px, py) => {
        if (t > 0.001 &&
            Math.abs(px - rx) <= hw + MARGIN + 0.5 &&
            Math.abs(py - ry) <= hh + MARGIN + 0.5)
            candidates.push([t, px, py])
    }
    if (Math.abs(dx) > 0.001) {
        const t1 = (rx - hw - MARGIN - ox) / dx; tryT(t1, ox + t1*dx, oy + t1*dy)
        const t2 = (rx + hw + MARGIN - ox) / dx; tryT(t2, ox + t2*dx, oy + t2*dy)
    }
    if (Math.abs(dy) > 0.001) {
        const t3 = (ry - hh - MARGIN - oy) / dy; tryT(t3, ox + t3*dx, oy + t3*dy)
        const t4 = (ry + hh + MARGIN - oy) / dy; tryT(t4, ox + t4*dx, oy + t4*dy)
    }
    candidates.sort((a, b) => a[0] - b[0])
    return candidates.length ? [candidates[0][1], candidates[0][2]] : [rx, ry]
}

/* ═══════════════════════════
   COLORS (theme-aware, no CSS
   variables — so PNG export
   works without extra steps)
═══════════════════════════ */
function colors() {
    if (isDark) return {
        bg:           '#171714',
        surface:      '#1e211c',
        text:         '#f0ece2',
        muted:        '#a09c92',
        border:       '#45443e',
        accent:       '#5cc98a',
        regionStroke: '#2a8a8a',
        regionFill:   'rgba(30,40,35,0.45)',
        regionLabel:  '#c44d8a',
        edgeStroke:   '#5a6e5a',
        arrowFill:    '#5a6e5a',
        nodeStroke:   '#3a6a4a',
        nodeFill:     '#1e3028',
        nodeText:     '#c8ecd4',
        noEprintStroke: '#6a5a3a',
        noEprintFill:   '#2a2218',
        noEprintText:   '#c8b890',
        flavourText:  '#2a8a8a',
    }
    return {
        bg:           '#ffffff',
        surface:      '#f2f8f4',
        text:         '#16130d',
        muted:        '#4a4740',
        border:       '#b0ada4',
        accent:       '#1c5c3b',
        regionStroke: '#1a8080',
        regionFill:   'rgba(200,235,220,0.35)',
        regionLabel:  '#b0206a',
        edgeStroke:   '#7aaa8a',
        arrowFill:    '#7aaa8a',
        nodeStroke:   '#4a9a6a',
        nodeFill:     '#eaf7ef',
        nodeText:     '#1a3a22',
        noEprintStroke: '#a08050',
        noEprintFill:   '#fdf5e6',
        noEprintText:   '#5a4020',
        flavourText:  '#1a8080',
    }
}

/* ═══════════════════════════
   PAN / ZOOM STATE
═══════════════════════════ */
let tx = 0, ty = 0, scale = 1
const svgEl = document.getElementById('graph-svg')
let rootG = null

function getTransform() {
    return `translate(${tx},${ty}) scale(${scale})`
}
function applyTransform() {
    if (rootG) rootG.setAttribute('transform', getTransform())
}
function zoomAt(cx, cy, factor) {
    const MIN = 0.2, MAX = 5
    const newScale = Math.max(MIN, Math.min(MAX, scale * factor))
    const r = newScale / scale
    tx = cx - r * (cx - tx)
    ty = cy - r * (cy - ty)
    scale = newScale
    applyTransform()
}

// Map client point to SVG internal coords
function clientToSvg(cx, cy) {
    const rect = svgEl.getBoundingClientRect()
    const vb = svgEl.viewBox.baseVal
    return {
        x: (cx - rect.left) / rect.width  * vb.width,
        y: (cy - rect.top)  / rect.height * vb.height
    }
}

/* ═══════════════════════════
   MAIN RENDER
═══════════════════════════ */
function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16)
    return `${r},${g},${b}`
}

function render() {
    const C = colors()

    // Use saved _pos when available; auto-layout the rest
    const needsLayout = nodes.some(n => !n._pos)
    let pos = {}

    if (needsLayout) {
        const containerW = svgEl.parentElement.clientWidth || 800
        const { positions, totalW, totalH, NODE_W: NW, NODE_H: NH } = computeLayout(containerW)
        const VIEWPAD = 30
        for (const [id, p] of Object.entries(positions)) {
            pos[id] = { x: p.x + VIEWPAD, y: p.y + VIEWPAD }
        }
        // Merge saved positions over auto-layout ones
        nodes.forEach(n => { if (n._pos) pos[n.id] = n._pos })
    } else {
        // All nodes have saved positions — use them directly
        nodes.forEach(n => { pos[n.id] = n._pos })
    }

    // Derive viewBox from actual positions
    const NODE_W = 128, NODE_H = 38
    const VIEWPAD = 40
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity
    for (const p of Object.values(pos)) {
        minX = Math.min(minX, p.x - NODE_W/2)
        minY = Math.min(minY, p.y - NODE_H/2)
        maxX = Math.max(maxX, p.x + NODE_W/2)
        maxY = Math.max(maxY, p.y + NODE_H/2)
    }
    const VW = (maxX - minX) + VIEWPAD * 2
    const VH = (maxY - minY) + VIEWPAD * 2
    // Offset so minX/minY map to VIEWPAD
    const ox = VIEWPAD - minX, oy = VIEWPAD - minY
    const shiftedPos = {}
    for (const [id, p] of Object.entries(pos)) shiftedPos[id] = { x: p.x + ox, y: p.y + oy }

    svgEl.setAttribute('viewBox', `0 0 ${VW} ${VH}`)
    svgEl.setAttribute('style', `background:${C.bg}`)

    // Clear
    while (svgEl.firstChild) svgEl.removeChild(svgEl.firstChild)
    rootG = el('g', { transform: getTransform() })
    svgEl.appendChild(rootG)

    // Use shifted positions everywhere
    const finalPos = shiftedPos

    // ── Arrow marker ──
    const defs = el('defs')
    const marker = el('marker', { id: 'arr', viewBox: '0 0 10 10', refX: '9', refY: '5', markerWidth: '6', markerHeight: '6', orient: 'auto-start-reverse' })
    marker.appendChild(el('path', { d: 'M0,0 L10,5 L0,10 z', fill: C.arrowFill }))
    defs.appendChild(marker)
    rootG.appendChild(defs)

    // ── Region boxes (back layer) ──
    const regionBoxes = computeRegions(finalPos, NODE_W, NODE_H, tag_regions)
    for (const box of regionBoxes) {
        const tagColor = box.color
        const fillRgb  = hexToRgb(tagColor)
        rootG.appendChild(el('rect', {
            x: box.x, y: box.y, width: box.w, height: box.h,
            rx: 8, ry: 8,
            fill:   isDark ? `rgba(${fillRgb},0.18)` : `rgba(${fillRgb},0.10)`,
            stroke: tagColor,
            'stroke-width': '1.8',
            'stroke-dasharray': box.order > 2 ? '7,3' : 'none'
        }))
        // Label in top-right corner, always in the tag's own color
        rootG.appendChild(el('text', {
            x: box.x + box.w - 8,
            y: box.y + 16,
            'text-anchor': 'end',
            fill: tagColor,
            'font-family': 'ui-monospace, monospace',
            'font-size': '12',
            'font-weight': '700',
        }, box.label))
    }

    // ── Edges ──
    for (const edge of edges) {
        const src = finalPos[edge.from], tgt = finalPos[edge.to]
        if (!src || !tgt) continue

        const [x1, y1] = rectIntersect(tgt.x, tgt.y, src.x, src.y, NODE_W/2, NODE_H/2)
        const [x2, y2] = rectIntersect(src.x, src.y, tgt.x, tgt.y, NODE_W/2, NODE_H/2)

        // Subtle quadratic curve
        const mx = (x1+x2)/2, my = (y1+y2)/2
        const len = Math.hypot(x2-x1, y2-y1) || 1
        const nx = -(y2-y1)/len * 12, ny = (x2-x1)/len * 12

        rootG.appendChild(el('path', {
            d: `M${x1},${y1} Q${mx+nx},${my+ny} ${x2},${y2}`,
            fill: 'none',
            stroke: C.edgeStroke,
            'stroke-width': '1.4',
            'marker-end': 'url(#arr)'
        }))
    }

    // ── Nodes ──
    const nodeById = {}
    nodes.forEach(n => nodeById[n.id] = n)

    for (const node of nodes) {
        const p = finalPos[node.id]
        if (!p) continue
        const hasLink = !!node.eprint
        const isUncertain = !!node._uncertain

        const g = el('g')
        g.style.cursor = hasLink ? 'pointer' : 'default'

        // Box
        g.appendChild(el('rect', {
            x: p.x - NODE_W/2, y: p.y - NODE_H/2,
            width: NODE_W, height: NODE_H, rx: 5, ry: 5,
            fill:   hasLink ? C.nodeFill   : C.noEprintFill,
            stroke: hasLink ? C.nodeStroke : C.noEprintStroke,
            'stroke-width': '1.5',
            'stroke-dasharray': isUncertain ? '4,2' : 'none'
        }))

        // Uncertain badge "?"
        if (isUncertain) {
            g.appendChild(el('text', {
                x: p.x + NODE_W/2 - 5, y: p.y - NODE_H/2 + 9,
                'text-anchor': 'end',
                fill: C.muted,
                'font-family': 'ui-monospace, monospace',
                'font-size': '8',
                'font-weight': '700',
            }, '?'))
        }

        // Label (supports \n for two-line names)
        const lines = node.name.split('\n')
        if (lines.length === 1) {
            g.appendChild(el('text', {
                x: p.x, y: p.y,
                'text-anchor': 'middle', 'dominant-baseline': 'middle',
                fill: C.nodeText,
                'font-family': 'ui-monospace, monospace',
                'font-size': '11', 'font-weight': '600',
                'pointer-events': 'none'
            }, lines[0]))
        } else {
            const lineH = 13
            lines.forEach((line, i) => {
                g.appendChild(el('text', {
                    x: p.x,
                    y: p.y + (i - (lines.length - 1) / 2) * lineH,
                    'text-anchor': 'middle', 'dominant-baseline': 'middle',
                    fill: C.nodeText,
                    'font-family': 'ui-monospace, monospace',
                    'font-size': '10', 'font-weight': '600',
                    'pointer-events': 'none'
                }, line))
            })
        }

        // Flavour badges
        if (node.flavours && node.flavours.length) {
            g.appendChild(el('text', {
                x: p.x, y: p.y + NODE_H/2 + 11,
                'text-anchor': 'middle',
                fill: C.flavourText,
                'font-family': 'ui-monospace, monospace',
                'font-size': '8',
            }, node.flavours.join(' · ')))
        }

        // Events
        if (hasLink) {
            g.addEventListener('click', () => window.open(node.eprint, '_blank'))
        }
        g.addEventListener('mouseenter', e => showTooltip(e, node))
        g.addEventListener('mousemove',  e => moveTooltip(e))
        g.addEventListener('mouseleave', hideTooltip)

        rootG.appendChild(g)
    }

    // ── Legend ──
    buildLegend(C)
}

/* ═══════════════════════════
   TOOLTIP
═══════════════════════════ */
const ttEl = document.getElementById('tooltip')

function showTooltip(e, node) {
    const name = node.name.replace('\n', ' ')
    const uncertain = node._uncertain ? ' <span style="color:#c44d8a">⚠ uncertain</span>' : ''
    ttEl.innerHTML = `
        <div class="tt-name">${name}</div>
        <div class="tt-id">${node.id.startsWith('noprint') || node.id.includes('placeholder') ? '—' : node.id}${uncertain}</div>
        ${node.eprint
            ? '<div class="tt-hint">Click to open ePrint ↗</div>'
            : '<div class="tt-hint">No confirmed ePrint link</div>'}
    `
    ttEl.classList.add('show')
    moveTooltip(e)
}
function moveTooltip(e) {
    const outer = document.getElementById('graph-outer')
    const rect  = outer.getBoundingClientRect()
    let x = e.clientX - rect.left + 14
    let y = e.clientY - rect.top  + 14
    if (x + 220 > rect.width)  x = e.clientX - rect.left - 225
    if (y + 90  > rect.height) y = e.clientY - rect.top  - 90
    ttEl.style.left = x + 'px'
    ttEl.style.top  = y + 'px'
}
function hideTooltip() { ttEl.classList.remove('show') }

/* ═══════════════════════════
   LEGEND
═══════════════════════════ */
function buildLegend(C) {
    const lg = document.getElementById('legend')
    lg.innerHTML = ''

    const item = (swatchStyle, text) => {
        const div = document.createElement('div')
        div.className = 'legend-item'
        const sw = document.createElement('div')
        sw.className = 'l-swatch'
        Object.assign(sw.style, swatchStyle)
        const span = document.createElement('span')
        span.textContent = text
        div.appendChild(sw); div.appendChild(span)
        lg.appendChild(div)
    }

    item({ background: C.nodeFill,     borderColor: C.nodeStroke },     'Paper with ePrint link')
    item({ background: C.noEprintFill, borderColor: C.noEprintStroke }, 'No confirmed ePrint yet')

    // Region boxes — one entry per tag with its own color
    const sortedTags = Object.entries(tag_regions)
        .sort((a,b) => (a[1].draw_order||1) - (b[1].draw_order||1))
    for (const [tagId, tagDef] of sortedTags) {
        const tagColor = tagDef.color || C.regionStroke
        const fillRgb  = hexToRgb(tagColor)
        const sw = document.createElement('div')
        sw.className = 'l-swatch'
        Object.assign(sw.style, {
            background:  isDark ? `rgba(${fillRgb},0.25)` : `rgba(${fillRgb},0.12)`,
            borderColor: tagColor,
            borderStyle: (tagDef.draw_order||1) > 2 ? 'dashed' : 'solid'
        })
        const div = document.createElement('div')
        div.className = 'legend-item'
        const span = document.createElement('span')
        span.textContent = tagDef.label
        span.style.color = tagColor
        span.style.fontWeight = '600'
        div.appendChild(sw); div.appendChild(span)
        lg.appendChild(div)
    }
}

/* ═══════════════════════════
   PAN & ZOOM EVENTS
═══════════════════════════ */
const outer = document.getElementById('graph-outer')
let dragging = false, dragSX = 0, dragSY = 0, dragTX = 0, dragTY = 0

svgEl.addEventListener('mousedown', e => {
    if (e.button !== 0) return
    dragging = true
    dragSX = e.clientX; dragSY = e.clientY
    dragTX = tx; dragTY = ty
    svgEl.classList.add('dragging')
    e.preventDefault()
})
window.addEventListener('mousemove', e => {
    if (!dragging) return
    const rect = svgEl.getBoundingClientRect()
    const vb   = svgEl.viewBox.baseVal
    const ratio = vb.width / rect.width
    tx = dragTX + (e.clientX - dragSX) * ratio
    ty = dragTY + (e.clientY - dragSY) * ratio
    applyTransform()
})
window.addEventListener('mouseup', () => { dragging = false; svgEl.classList.remove('dragging') })

svgEl.addEventListener('wheel', e => {
    e.preventDefault()
    const p = clientToSvg(e.clientX, e.clientY)
    zoomAt(p.x, p.y, e.deltaY < 0 ? 1.12 : 1/1.12)
}, { passive: false })

// Touch
let touchDist0 = null, touchTX0 = 0, touchTY0 = 0
let touchSX = 0, touchSY = 0
svgEl.addEventListener('touchstart', e => {
    e.preventDefault()
    if (e.touches.length === 1) {
        dragging = true
        dragSX = e.touches[0].clientX; dragSY = e.touches[0].clientY
        dragTX = tx; dragTY = ty
    } else if (e.touches.length === 2) {
        dragging = false
        touchDist0 = tdist(e.touches)
        touchTX0 = tx; touchTY0 = ty
    }
}, { passive: false })
svgEl.addEventListener('touchmove', e => {
    e.preventDefault()
    if (e.touches.length === 1 && dragging) {
        const rect = svgEl.getBoundingClientRect()
        const vb   = svgEl.viewBox.baseVal
        const ratio = vb.width / rect.width
        tx = dragTX + (e.touches[0].clientX - dragSX) * ratio
        ty = dragTY + (e.touches[0].clientY - dragSY) * ratio
        applyTransform()
    } else if (e.touches.length === 2 && touchDist0) {
        const d = tdist(e.touches)
        const mid = tmid(e.touches)
        const p = clientToSvg(mid.x, mid.y)
        zoomAt(p.x, p.y, d / touchDist0)
        touchDist0 = d
    }
}, { passive: false })
svgEl.addEventListener('touchend', () => { dragging = false; touchDist0 = null })

function tdist(ts) { return Math.hypot(ts[0].clientX-ts[1].clientX, ts[0].clientY-ts[1].clientY) }
function tmid(ts)  { return { x:(ts[0].clientX+ts[1].clientX)/2, y:(ts[0].clientY+ts[1].clientY)/2 } }

// Buttons
document.getElementById('btn-zin') .addEventListener('click', () => { const vb = svgEl.viewBox.baseVal; zoomAt(vb.width/2, vb.height/2, 1.3) })
document.getElementById('btn-zout').addEventListener('click', () => { const vb = svgEl.viewBox.baseVal; zoomAt(vb.width/2, vb.height/2, 1/1.3) })
document.getElementById('btn-reset').addEventListener('click', () => { tx=0; ty=0; scale=1; applyTransform() })

/* ═══════════════════════════
   PNG DOWNLOAD
   Serializes SVG, bakes styles
   into it, renders to canvas.
═══════════════════════════ */
document.getElementById('btn-png').addEventListener('click', async () => {
    // Save current transform, reset for export
    const savedTx=tx, savedTy=ty, savedScale=scale
    tx=0; ty=0; scale=1; applyTransform()

    const vb     = svgEl.viewBox.baseVal
    const W      = vb.width, H = vb.height
    const SCALE  = 2  // retina

    // Clone + add a self-contained style block (no CSS variables)
    const clone  = svgEl.cloneNode(true)
    const C      = colors()
    const style  = document.createElementNS('http://www.w3.org/2000/svg', 'style')
    style.textContent = `
        text { font-family: ui-monospace, 'Courier New', monospace; }
    `
    clone.insertBefore(style, clone.firstChild)
    clone.setAttribute('width',  W * SCALE)
    clone.setAttribute('height', H * SCALE)

    const svgStr  = new XMLSerializer().serializeToString(clone)
    const b64     = btoa(unescape(encodeURIComponent(svgStr)))
    const url     = `data:image/svg+xml;base64,${b64}`
 

    const img = new Image()
    img.onload = () => {
        const canvas = document.createElement('canvas')
        canvas.width  = W * SCALE
        canvas.height = H * SCALE
        const ctx = canvas.getContext('2d')
        ctx.drawImage(img, 0, 0)
        URL.revokeObjectURL(url)

        const a = document.createElement('a')
        a.download = 'isogeny-landscape.png'
        a.href = canvas.toDataURL('image/png')
        a.click()

        // Restore transform
        tx=savedTx; ty=savedTy; scale=savedScale; applyTransform()
    }
    img.onerror = () => {
        URL.revokeObjectURL(url)
        tx=savedTx; ty=savedTy; scale=savedScale; applyTransform()
    }
    img.src = url
})

/* ═══════════════════════════
   RESPONSIVE: re-render on
   container resize
═══════════════════════════ */
let resizeTimer = null
new ResizeObserver(() => {
    clearTimeout(resizeTimer)
    resizeTimer = setTimeout(() => { tx=0; ty=0; scale=1; render() }, 120)
}).observe(svgEl.parentElement)

// Initial render
render()

})()
</script>
